<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OPS Nativo</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Epilogue:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f7f3ed;--bg2:#ede7da;--bg3:#e2d9cc;--white:#fff;
  --ink:#1c1712;--ink-dim:#7a6e62;--ink-faint:#b0a898;
  --gold:#b8860b;--gold-lt:#fdf5dc;--gold-bd:#e8c84a;
  --green:#1e7a3e;--green-lt:#e6f4ec;
  --red:#b03020;--red-lt:#fdecea;
  --amber:#c07010;--amber-lt:#fef3e2;
  --blue:#1a5c8a;--blue-lt:#e8f1f8;
  --purple:#6d3aad;--beer:#e8a020;--beer-lt:#fef6e4;
  --shadow:0 1px 8px rgba(0,0,0,.07);--shadow-md:0 4px 20px rgba(0,0,0,.12);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#f9f7e5;color:var(--ink);font-family:'Epilogue',sans-serif;min-height:100vh;padding-bottom:90px;}
.sync-bar{background:var(--green);color:#fff;text-align:center;font-size:.65rem;font-weight:600;padding:4px;display:none;}
.sync-bar.show{display:block;}.sync-bar.error{background:var(--red);}.sync-bar.syncing{background:var(--amber);}
#screen-login{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px;background:#f9f7e5;}
.login-logo{font-family:'Syne',sans-serif;font-weight:800;font-size:2rem;letter-spacing:3px;color:#f7f3ed;margin-bottom:4px;}
.login-sub{font-size:.72rem;color:rgba(255,255,255,.4);margin-bottom:32px;letter-spacing:2px;text-transform:uppercase;}
.login-card{background:rgba(255,255,255,.9);border-radius:16px;padding:24px;width:100%;max-width:340px;box-shadow:0 8px 40px rgba(0,0,0,.4);border:1px solid rgba(255,255,255,.08);}
.lc-title{font-size:.65rem;letter-spacing:.12em;text-transform:uppercase;color:rgba(28,58,122,.5);margin-bottom:12px;}
.user-list{display:flex;flex-direction:column;gap:8px;margin-bottom:20px;}
.user-btn{display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:10px;border:1.5px solid rgba(28,68,148,.15);background:rgba(28,68,148,.05);cursor:pointer;transition:all .15s;}
.user-btn.sel{border-color:var(--gold);background:rgba(184,134,11,.15);}
.ub-av{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:.9rem;}
.ub-info{flex:1;}.ub-name{font-weight:700;font-size:.9rem;color:#1c3a7a;}
.ub-role{font-size:.65rem;color:rgba(28,58,122,.6);}
.pin-lbl{font-size:.8rem;font-weight:600;color:#1c3a7a;margin-bottom:10px;text-align:center;}
.pin-dots{display:flex;gap:10px;justify-content:center;margin-bottom:16px;}
.pin-dot{width:12px;height:12px;border-radius:50%;background:rgba(28,58,122,.15);border:1.5px solid rgba(28,58,122,.3);transition:all .15s;}
.pin-dot.filled{background:#1c3a7a;border-color:#1c3a7a;}
.pin-pad{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
.pin-key{background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.1);border-radius:10px;padding:14px 0;text-align:center;font-family:'Syne',sans-serif;font-weight:700;font-size:1.1rem;cursor:pointer;color:#f7f3ed;}
.pin-key:active{background:rgba(184,134,11,.2);border-color:var(--gold);}
.pin-key.del{font-size:.85rem;color:var(--red);}
.pin-error{text-align:center;font-size:.72rem;color:var(--red);font-weight:600;margin-top:8px;min-height:18px;}
.login-enter{width:100%;margin-top:12px;padding:13px;background:var(--gold);color:#fff;border:none;border-radius:10px;font-family:'Syne',sans-serif;font-weight:700;font-size:.9rem;cursor:pointer;}
#screen-app{display:none;}
.topbar{background:var(--ink);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;}
.tb-brand{font-family:'Syne',sans-serif;font-weight:800;font-size:.9rem;color:#f7f3ed;letter-spacing:1px;}
.tb-right{display:flex;align-items:center;gap:6px;}
.tb-user{font-size:.65rem;background:rgba(255,255,255,.12);color:#f7f3ed;padding:3px 8px;border-radius:20px;font-weight:600;}
.tb-week{font-size:.65rem;background:var(--gold);color:#fff;padding:3px 8px;border-radius:20px;font-weight:700;}
.tb-logout{font-size:.65rem;background:var(--red);color:#fff;padding:3px 8px;border-radius:20px;font-weight:700;cursor:pointer;}
.role-bar{display:flex;background:var(--bg2);border-bottom:2px solid var(--bg3);overflow-x:auto;}
.role-tab{flex:1;min-width:55px;padding:10px 4px;text-align:center;font-size:.58rem;font-weight:700;font-family:'Syne',sans-serif;text-transform:uppercase;color:var(--ink-dim);cursor:pointer;border-bottom:3px solid transparent;transition:all .2s;white-space:nowrap;}
.role-tab.active{color:var(--ink);border-bottom-color:var(--gold);background:#f9f7e5;}
.role-tab .ri{font-size:.9rem;display:block;margin-bottom:1px;}
.panel{display:none;padding:14px 14px 0;animation:fadeUp .25s ease;}
.panel.active{display:block;}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.week-nav{background:var(--white);border-radius:12px;padding:10px 14px;box-shadow:var(--shadow);margin-bottom:12px;border:1px solid rgba(0,0,0,.05);}
.wn-top{display:flex;align-items:center;gap:8px;}
.wn-btn{background:var(--bg2);border:none;border-radius:6px;width:28px;height:28px;font-size:.9rem;cursor:pointer;color:var(--ink);display:flex;align-items:center;justify-content:center;}
.wn-c{flex:1;text-align:center;}.wn-lbl{font-family:'Syne',sans-serif;font-weight:700;font-size:.82rem;}
.wn-sub{font-size:.6rem;color:var(--ink-dim);margin-top:1px;}
.wn-dates{text-align:center;font-size:.62rem;color:var(--gold);font-weight:600;margin-top:6px;padding-top:6px;border-top:1px solid var(--bg2);}
.lvl-hdr{display:flex;align-items:center;gap:10px;padding:11px 14px;border-radius:10px;margin-bottom:12px;}
.lh-ger{background:var(--ink);color:#f7f3ed;}.lh-enc{background:#3d2010;color:#f7f3ed;}.lh-mes{background:#1e3a5f;color:#f7f3ed;}
.lh-icon{font-size:1.2rem;}.lh-info{flex:1;}
.lh-title{font-family:'Syne',sans-serif;font-weight:700;font-size:.85rem;}
.lh-sub{font-size:.6rem;opacity:.65;margin-top:1px;}
.lh-tag{font-size:.6rem;font-weight:700;padding:3px 9px;border-radius:20px;background:rgba(255,255,255,.15);}
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
.kpi-grid.three{grid-template-columns:1fr 1fr 1fr;}
.kpi-card{background:var(--white);border-radius:10px;padding:11px 12px;box-shadow:var(--shadow);border:1px solid rgba(0,0,0,.05);position:relative;overflow:hidden;}
.kpi-card::after{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--ac,var(--gold));}
.kpi-card.ac-gold{--ac:var(--gold)}.kpi-card.ac-green{--ac:var(--green)}.kpi-card.ac-blue{--ac:var(--blue)}.kpi-card.ac-amber{--ac:var(--amber)}.kpi-card.ac-purple{--ac:var(--purple)}.kpi-card.ac-beer{--ac:var(--beer)}.kpi-card.ac-red{--ac:var(--red)}
.kc-lbl{font-size:.58rem;text-transform:uppercase;letter-spacing:1.2px;color:var(--ink-dim);font-weight:600;margin-bottom:3px;}
.kc-val{font-family:'Syne',sans-serif;font-size:1.3rem;font-weight:700;line-height:1;}
.kc-sub{font-size:.6rem;color:var(--ink-faint);margin-top:3px;}
.kc-pill{display:inline-block;font-size:.58rem;font-weight:700;padding:2px 7px;border-radius:10px;margin-top:4px;}
.p-ok{background:var(--green-lt);color:var(--green)}.p-warn{background:var(--amber-lt);color:var(--amber)}.p-off{background:var(--red-lt);color:var(--red)}.p-neu{background:var(--bg2);color:var(--ink-dim)}
.inp-card{background:var(--white);border-radius:12px;padding:13px;box-shadow:var(--shadow);border:1px solid rgba(0,0,0,.05);margin-bottom:10px;}
.ic-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.ic-lbl{font-size:.6rem;text-transform:uppercase;letter-spacing:1px;color:var(--ink-dim);font-weight:600;display:block;margin-bottom:3px;}
.ic-inp{width:100%;background:var(--bg);border:1.5px solid var(--bg2);color:var(--ink);font-family:'Epilogue',sans-serif;font-size:.88rem;font-weight:500;padding:8px 11px;border-radius:8px;outline:none;transition:border-color .2s;}
.ic-inp:focus{border-color:var(--gold);background:var(--white);}
.ic-inp.ro-gold{color:var(--gold);font-weight:700;background:var(--gold-lt);border-color:transparent;pointer-events:none;}
.pal-row{display:flex;align-items:center;gap:8px;padding:9px 0;border-bottom:1px solid var(--bg);}
.pal-row:last-child{border-bottom:none;}
.pal-icon{font-size:.95rem;width:22px;text-align:center;}
.pal-info{flex:1;min-width:0;}
.pal-name{font-size:.72rem;font-weight:600;}
.pal-meta{font-size:.58rem;color:var(--ink-faint);}
.pal-bar-wrap{height:3px;background:var(--bg2);border-radius:2px;margin-top:4px;overflow:hidden;}
.pal-bar{height:100%;border-radius:2px;transition:width .4s;}
.pal-inp-wrap{display:flex;flex-direction:column;align-items:flex-end;gap:2px;min-width:72px;}
.pal-inp{width:68px;background:var(--bg);border:1.5px solid var(--bg2);color:var(--ink);font-size:.82rem;font-weight:500;padding:6px 8px;border-radius:7px;outline:none;text-align:center;font-family:'Epilogue',sans-serif;}
.pal-inp:focus{border-color:var(--gold);}
.pal-sub{font-size:.58rem;color:var(--green);font-weight:600;text-align:right;}
.pal-meta-chip{font-size:.56rem;background:var(--bg2);color:var(--ink-dim);padding:1px 5px;border-radius:6px;display:inline-block;}
/* MUNDIAL */
.mundial-hdr{background:linear-gradient(135deg,#1a1200,#2a1f00);border-radius:12px;padding:14px;margin-bottom:10px;color:#f7f3ed;border:1px solid var(--beer);}
.mh-title{font-family:'Syne',sans-serif;font-weight:800;font-size:1rem;color:var(--beer);}
.mh-kpis{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-top:10px;}
.mhk{background:rgba(255,255,255,.08);border-radius:8px;padding:8px;text-align:center;}
.mhk-val{font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:700;color:var(--beer);}
.mhk-lbl{font-size:.56rem;opacity:.65;margin-top:2px;text-transform:uppercase;}
.partido-card{background:var(--white);border-radius:12px;padding:13px;box-shadow:var(--shadow);margin-bottom:8px;border-left:4px solid var(--bg3);}
.partido-card.premium{border-left-color:#c9a84c;}.partido-card.medio{border-left-color:#3498db;}.partido-card.bajo{border-left-color:#2ecc71;}
.pc-badge{font-size:.55rem;font-weight:700;padding:2px 8px;border-radius:20px;text-transform:uppercase;}
.badge-premium{background:#c9a84c;color:#fff;}.badge-medio{background:#3498db;color:#fff;}.badge-bajo{background:#2ecc71;color:#fff;}
.pc-match{font-family:'Syne',sans-serif;font-weight:700;font-size:.82rem;}
.pc-fecha{font-size:.6rem;color:var(--ink-dim);margin-top:2px;}
.pc-row{display:flex;align-items:center;gap:8px;padding:5px 0;}
.pc-row-lbl{font-size:.62rem;color:var(--ink-dim);flex:1;}
.pc-inp{width:65px;background:var(--bg);border:1.5px solid var(--bg2);color:var(--ink);font-size:.8rem;padding:5px 8px;border-radius:6px;outline:none;text-align:center;font-family:'Epilogue',sans-serif;}
.pc-inp:focus{border-color:var(--beer);}
.pc-auto{font-size:.65rem;font-weight:700;color:var(--beer);min-width:55px;text-align:right;}
/* MES MUNDIAL */
.mes-mundial-card{background:linear-gradient(135deg,#1a1200,#1c1c1c);border-radius:12px;padding:13px;margin-bottom:8px;border:1px solid var(--beer);color:#f7f3ed;}
.mmc-inp{width:100%;background:rgba(255,255,255,.1);border:1.5px solid rgba(255,255,255,.15);color:#f7f3ed;font-size:.82rem;padding:6px 8px;border-radius:6px;outline:none;text-align:center;font-family:'Epilogue',sans-serif;margin-top:4px;}
.mmc-inp:focus{border-color:var(--beer);}
/* COMENTARIOS */
.comment-section{margin-bottom:10px;}
.comment-item{border-radius:10px;padding:12px;margin-bottom:8px;border-left:4px solid;transition:all .3s;}
.comment-item.rojo{background:#fff5f5;border-left-color:var(--red);}
.comment-item.amarillo{background:#fffbf0;border-left-color:var(--amber);}
.comment-item.verde{background:var(--green-lt);border-left-color:var(--green);}
.comment-text{font-size:.78rem;font-weight:500;margin-bottom:8px;color:var(--ink);}
.comment-meta{font-size:.6rem;color:var(--ink-faint);margin-bottom:8px;}
.comment-checks{display:flex;gap:8px;}
.check-btn{flex:1;padding:6px;border:none;border-radius:7px;font-size:.65rem;font-weight:700;cursor:pointer;transition:all .2s;font-family:'Syne',sans-serif;}
.check-btn.enterado{background:var(--amber-lt);color:var(--amber);}
.check-btn.enterado.active{background:var(--amber);color:#fff;}
.check-btn.realizado{background:var(--green-lt);color:var(--green);}
.check-btn.realizado.active{background:var(--green);color:#fff;}
.comment-input-area{background:var(--white);border-radius:12px;padding:13px;box-shadow:var(--shadow);margin-bottom:10px;}
.comment-input{width:100%;background:var(--bg);border:1.5px solid var(--bg2);color:var(--ink);font-family:'Epilogue',sans-serif;font-size:.82rem;padding:9px 11px;border-radius:8px;outline:none;resize:none;min-height:70px;}
.comment-input:focus{border-color:var(--gold);}
.comment-send-row{display:flex;gap:8px;margin-top:8px;}
.comment-target-sel{flex:1;background:var(--bg);border:1.5px solid var(--bg2);color:var(--ink);font-size:.78rem;padding:7px 10px;border-radius:8px;outline:none;}
.comment-send-btn{background:var(--gold);color:#fff;border:none;border-radius:8px;padding:7px 14px;font-family:'Syne',sans-serif;font-weight:700;font-size:.75rem;cursor:pointer;}
.archived-item{padding:8px 12px;border-radius:8px;background:var(--green-lt);border:1px solid var(--green);margin-bottom:6px;font-size:.72rem;color:var(--green);}
/* BANNERS */
.grand-total{background:linear-gradient(135deg,var(--gold),#d4a017);border-radius:12px;padding:14px;margin-bottom:10px;color:#fff;}
.gt-lbl{font-size:.68rem;opacity:.85;margin-bottom:4px;}
.gt-val{font-family:'Syne',sans-serif;font-size:1.6rem;font-weight:800;}
.gt-sub{font-size:.62rem;opacity:.75;margin-top:4px;}
.total-banner{background:var(--ink);color:#f7f3ed;border-radius:12px;padding:14px;margin-bottom:10px;}
.tot-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;}
.tot-lbl{font-size:.68rem;opacity:.7;}
.tot-val{font-family:'Syne',sans-serif;font-weight:700;font-size:1.1rem;}
.tot-divider{height:1px;background:rgba(255,255,255,.15);margin:6px 0;}
/* SEMAFORO DG */
.semaforo-card{border-radius:16px;padding:20px;margin-bottom:12px;text-align:center;}
.semaforo-card.verde{background:linear-gradient(135deg,#0d5c2a,#1e7a3e);}
.semaforo-card.amarillo{background:linear-gradient(135deg,#7a4a00,#c07010);}
.semaforo-card.rojo{background:linear-gradient(135deg,#6b1010,#b03020);}
.sem-icon{font-size:3rem;margin-bottom:8px;}
.sem-status{font-family:'Syne',sans-serif;font-weight:800;font-size:1.4rem;color:#fff;}
.sem-pct{font-family:'Syne',sans-serif;font-size:2.5rem;font-weight:800;color:#fff;margin-top:8px;}
.sem-msg{font-size:.75rem;color:rgba(255,255,255,.8);margin-top:4px;}
.dg-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
.dg-card{background:var(--white);border-radius:14px;padding:14px;box-shadow:var(--shadow-md);}
.dg-card-title{font-family:'Syne',sans-serif;font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--ink-dim);margin-bottom:10px;}
.dg-big-val{font-family:'Syne',sans-serif;font-size:1.5rem;font-weight:800;color:var(--ink);line-height:1;margin-bottom:4px;}
.dg-sub{font-size:.62rem;color:var(--ink-faint);}
.dg-bar-wrap{height:6px;background:var(--bg2);border-radius:3px;overflow:hidden;margin:8px 0 4px;}
.dg-bar{height:100%;border-radius:3px;transition:width .6s;}
.dg-bar-lbl{font-size:.6rem;color:var(--ink-dim);display:flex;justify-content:space-between;}
.rank-dg{display:flex;flex-direction:column;gap:6px;}
.rank-dg-item{display:flex;align-items:center;gap:8px;padding:7px 10px;background:var(--bg);border-radius:8px;}
.rdi-pos{font-family:'Syne',sans-serif;font-weight:800;font-size:.9rem;min-width:20px;}
.rdi-pos.p1{color:#c9a84c}.rdi-pos.p2{color:#909090}.rdi-pos.p3{color:#b07040}
.rdi-name{font-size:.72rem;font-weight:600;flex:1;}
.rdi-bar-wrap{width:50px;height:4px;background:var(--bg2);border-radius:2px;overflow:hidden;}
.rdi-bar{height:100%;border-radius:2px;}
.rdi-pct{font-size:.65rem;font-weight:700;min-width:32px;text-align:right;}
.hist-dg{display:flex;flex-direction:column;gap:5px;}
.hdg-item{display:flex;align-items:center;gap:8px;}
.hdg-sem{font-family:'Syne',sans-serif;font-weight:700;font-size:.68rem;min-width:48px;color:var(--ink-dim);}
.hdg-bar-wrap{flex:1;height:16px;background:var(--bg2);border-radius:4px;overflow:hidden;}
.hdg-bar{height:100%;border-radius:4px;display:flex;align-items:center;padding-left:6px;}
.hdg-bar-lbl{font-size:.58rem;font-weight:700;color:#fff;}
.hdg-val{font-size:.65rem;font-weight:600;min-width:50px;text-align:right;}
/* ADMIN */
.admin-section{background:var(--white);border-radius:12px;padding:14px;box-shadow:var(--shadow);margin-bottom:10px;}
.admin-title{font-family:'Syne',sans-serif;font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--ink-dim);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--bg2);}
.admin-user-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--bg);}
.admin-user-row:last-child{border-bottom:none;}
.aur-av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:700;font-size:.72rem;flex-shrink:0;}
.aur-name-inp{flex:1;background:var(--bg);border:1.5px solid var(--bg2);font-size:.78rem;padding:5px 8px;border-radius:6px;outline:none;font-family:'Epilogue',sans-serif;}
.aur-inp{width:65px;background:var(--bg);border:1.5px solid var(--bg2);font-size:.78rem;padding:5px 8px;border-radius:6px;outline:none;text-align:center;font-family:'Epilogue',sans-serif;}
.save-admin-btn{width:100%;padding:10px;background:var(--ink);color:#fff;border:none;border-radius:8px;font-family:'Syne',sans-serif;font-weight:700;font-size:.82rem;cursor:pointer;margin-top:10px;}
.rank-list{display:flex;flex-direction:column;gap:6px;}
.rank-item{display:flex;align-items:center;gap:10px;padding:10px 13px;background:var(--white);border-radius:10px;box-shadow:var(--shadow);}
.rank-pos{font-family:'Syne',sans-serif;font-weight:800;font-size:1rem;min-width:22px;text-align:center;}
.rank-pos.p1{color:#c9a84c}.rank-pos.p2{color:#909090}.rank-pos.p3{color:#b07040}
.rank-info{flex:1;}.rank-name{font-weight:600;font-size:.8rem;}.rank-det{font-size:.6rem;color:var(--ink-dim);}
.rank-right{text-align:right;}.rank-val{font-family:'Syne',sans-serif;font-weight:700;font-size:.88rem;}
.sec-title{font-family:'Syne',sans-serif;font-size:.66rem;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--ink-dim);margin:14px 0 8px;display:flex;align-items:center;gap:6px;}
.sec-title::after{content:'';flex:1;height:1px;background:var(--bg3);}
.div{height:1px;background:var(--bg2);margin:10px 0;}
.rev-card{background:var(--white);border-radius:12px;padding:14px;box-shadow:var(--shadow);margin-bottom:10px;}
.stars-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:10px;}
.star-box{background:var(--bg);border-radius:8px;padding:8px;text-align:center;}
.sb-val{font-family:'Syne',sans-serif;font-size:1.2rem;font-weight:700;}
.sb-lbl{font-size:.56rem;color:var(--ink-dim);text-transform:uppercase;letter-spacing:.8px;margin-top:2px;}
.team-banner{background:var(--gold-lt);border:1px solid var(--gold-bd);border-radius:10px;padding:11px 13px;margin-bottom:10px;display:flex;align-items:center;gap:10px;}
.fab{position:fixed;bottom:18px;right:14px;background:var(--gold);color:#fff;border:none;border-radius:50px;padding:12px 20px;font-family:'Syne',sans-serif;font-weight:700;font-size:.82rem;cursor:pointer;box-shadow:0 4px 18px rgba(184,134,11,.4);display:flex;align-items:center;gap:6px;z-index:300;}
.toast{position:fixed;bottom:68px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--green);color:#fff;font-weight:600;padding:9px 20px;border-radius:8px;font-size:.75rem;transition:all .3s;z-index:999;opacity:0;pointer-events:none;white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
.hist-item{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--bg2);}
.hist-item:last-child{border-bottom:none;}
.hist-sem{font-family:'Syne',sans-serif;font-weight:700;font-size:.7rem;min-width:55px;}
.hist-bar-wrap{flex:1;height:4px;background:var(--bg2);border-radius:2px;overflow:hidden;}
.hist-bar{height:100%;background:var(--gold);border-radius:2px;}
.hist-val{font-size:.7rem;font-weight:600;min-width:70px;text-align:right;}
.readonly-note{font-size:.6rem;color:var(--ink-faint);text-align:center;padding:6px;background:var(--bg2);border-radius:6px;margin-bottom:10px;}

.edit-mode-banner{display:none;background:linear-gradient(135deg,#1a3a5f,#1A5C8A);color:#fff;border-radius:12px;padding:12px 14px;margin-bottom:10px;align-items:center;gap:10px;}
.edit-mode-banner.active{display:flex;}
.emb-icon{font-size:1.4rem;}.emb-info{flex:1;}
.emb-title{font-family:'Syne',sans-serif;font-weight:700;font-size:.85rem;}
.emb-sub{font-size:.62rem;opacity:.75;margin-top:2px;}
.emb-autosave{font-size:.6rem;background:rgba(255,255,255,.15);padding:2px 8px;border-radius:10px;font-weight:600;}
.edit-btn{background:var(--gold);color:#fff;border:none;border-radius:10px;padding:11px;font-family:'Syne',sans-serif;font-weight:700;font-size:.82rem;cursor:pointer;width:100%;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:10px;box-shadow:0 3px 12px rgba(184,134,11,.3);}
.close-edit-btn{background:var(--green);color:#fff;border:none;border-radius:10px;padding:11px;font-family:'Syne',sans-serif;font-weight:700;font-size:.82rem;cursor:pointer;width:100%;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:10px;box-shadow:0 3px 12px rgba(30,122,62,.3);}
.autosave-indicator{position:fixed;top:52px;right:10px;background:var(--green);color:#fff;font-size:.6rem;font-weight:700;padding:3px 10px;border-radius:20px;z-index:400;display:none;}
.autosave-indicator.show{display:block;}
.locked-note{font-size:.65rem;color:var(--ink-faint);text-align:center;padding:5px 0;font-style:italic;}

.celebration-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:linear-gradient(135deg,#0d5c2a,#1e7a3e);z-index:500;flex-direction:column;align-items:center;justify-content:center;padding:30px;animation:celebIn .4s ease;}
.celebration-overlay.show{display:flex;}
@keyframes celebIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
.celeb-trophy{font-size:5rem;margin-bottom:16px;animation:bounce 1s infinite alternate;}
@keyframes bounce{from{transform:translateY(0)}to{transform:translateY(-12px)}}
.celeb-title{font-family:'Syne',sans-serif;font-weight:800;font-size:1.8rem;color:#fff;text-align:center;letter-spacing:2px;text-shadow:0 2px 20px rgba(0,0,0,.3);}
.celeb-msg{font-family:'Syne',sans-serif;font-size:1.1rem;color:rgba(255,255,255,.9);text-align:center;margin-top:12px;font-weight:600;}
.celeb-sub{font-size:.82rem;color:rgba(255,255,255,.7);text-align:center;margin-top:8px;line-height:1.5;}
.celeb-stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:24px 0;width:100%;max-width:300px;}
.celeb-stat{background:rgba(255,255,255,.15);border-radius:12px;padding:12px;text-align:center;}
.celeb-stat-val{font-family:'Syne',sans-serif;font-size:1.3rem;font-weight:800;color:#fff;}
.celeb-stat-lbl{font-size:.6rem;color:rgba(255,255,255,.7);text-transform:uppercase;letter-spacing:1px;margin-top:2px;}
.celeb-close{background:#fff;color:var(--green);border:none;border-radius:12px;padding:14px 32px;font-family:'Syne',sans-serif;font-weight:800;font-size:.9rem;letter-spacing:1px;cursor:pointer;margin-top:8px;box-shadow:0 4px 20px rgba(0,0,0,.2);}
.celeb-stars{font-size:1.2rem;letter-spacing:4px;margin-bottom:8px;}
</style>
