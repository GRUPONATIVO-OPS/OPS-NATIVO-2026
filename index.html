<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<meta name="theme-color" content="#0b0e1f">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>OPS Nativo — Grupo Nativo</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --navy:#0b0e1f;--navy2:#111428;
  --gold:#c9a84c;--gold2:#e2c06a;
  --border:rgba(201,168,76,.18);
}
html,body{min-height:100vh;background:var(--navy);color:#fff;font-family:'Outfit',sans-serif;overflow-x:hidden;}
body::before{
  content:'';position:fixed;inset:0;z-index:0;
  background:radial-gradient(ellipse 110% 60% at 50% -10%,rgba(201,168,76,.14) 0%,transparent 65%);
}
body::after{
  content:'';position:fixed;inset:0;z-index:0;
  background-image:
    linear-gradient(rgba(201,168,76,.04) 1px,transparent 1px),
    linear-gradient(90deg,rgba(201,168,76,.04) 1px,transparent 1px);
  background-size:44px 44px;
  mask-image:radial-gradient(ellipse 90% 90% at 50% 50%,black 0%,transparent 100%);
}
.page{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding-bottom:48px;}
.top-bar{width:100%;height:3px;background:linear-gradient(90deg,transparent,var(--gold),var(--gold2),var(--gold),transparent);flex-shrink:0;}
.header{padding:36px 24px 16px;display:flex;flex-direction:column;align-items:center;animation:fadeUp .5s ease both;}
.icono{width:64px;height:64px;margin-bottom:14px;}
.icono img{width:100%;height:100%;object-fit:contain;filter:drop-shadow(0 0 18px rgba(201,168,76,.5));}
.grupo-logo img{width:160px;object-fit:contain;filter:drop-shadow(0 2px 12px rgba(201,168,76,.3));}
.divider{width:48px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:14px auto;}
.sub{font-size:.62rem;letter-spacing:.22em;text-transform:uppercase;color:rgba(255,255,255,.38);}
.badge{
  width:calc(100% - 40px);max-width:440px;margin-bottom:20px;
  padding:12px 16px;border-radius:12px;
  background:linear-gradient(135deg,rgba(201,168,76,.1),rgba(201,168,76,.04));
  border:1px solid rgba(201,168,76,.25);
  display:flex;align-items:center;gap:12px;
  animation:fadeUp .5s .08s ease both;
}
.dot{width:7px;height:7px;border-radius:50%;background:#4caf50;box-shadow:0 0 8px rgba(76,175,80,.8);animation:pulse 2s ease infinite;flex-shrink:0;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.25;}}
.badge-t{font-size:.68rem;font-weight:600;color:var(--gold2);letter-spacing:.04em;}
.badge-s{font-size:.58rem;color:rgba(255,255,255,.38);margin-top:2px;}
.sec{width:calc(100% - 40px);max-width:440px;display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.sec-line{flex:1;height:1px;background:var(--border);}
.sec-txt{font-size:.54rem;letter-spacing:.18em;text-transform:uppercase;color:rgba(201,168,76,.4);white-space:nowrap;}
.cards{width:calc(100% - 40px);max-width:440px;display:flex;flex-direction:column;gap:10px;animation:fadeUp .5s .14s ease both;}
.card{
  display:block;text-decoration:none;border-radius:20px;overflow:hidden;
  position:relative;border:1px solid var(--border);cursor:pointer;
  transition:transform .18s ease,box-shadow .18s ease;
  -webkit-user-select:none;user-select:none;
}
.card:hover{transform:translateY(-3px);box-shadow:0 10px 40px rgba(0,0,0,.5),0 0 0 1px rgba(201,168,76,.3);}
.card:active{transform:scale(.97);box-shadow:none;}
.card-accent{position:absolute;top:0;left:0;right:0;height:2px;z-index:2;}
.card-body{padding:22px 20px;display:flex;align-items:center;justify-content:center;min-height:105px;position:relative;z-index:1;}
.card-body img{max-height:72px;max-width:85%;object-fit:contain;}
.card-tag{
  position:absolute;bottom:10px;right:14px;z-index:2;
  display:flex;align-items:center;gap:5px;
  font-size:.52rem;letter-spacing:.06em;color:rgba(255,255,255,.32);
}
.sdot{width:5px;height:5px;border-radius:50%;background:#4caf50;animation:pulse 2s ease infinite;}
/* Per-card themes */
.pen{background:linear-gradient(140deg,#111428 0%,#151a38 100%);}
.pen .card-accent{background:linear-gradient(90deg,transparent,#c9a84c,#e2c06a,#c9a84c,transparent);}
.chet{background:linear-gradient(140deg,#0e1820 0%,#0f2030 100%);}
.chet .card-accent{background:linear-gradient(90deg,transparent,#4ecdc4,#00c9b8,#4ecdc4,transparent);}
.chet .card-tag{color:rgba(78,205,196,.4);}
.chet .sdot{background:#4ecdc4;}
.cv{background:linear-gradient(140deg,#1a1200 0%,#211700 100%);}
.cv .card-accent{background:linear-gradient(90deg,transparent,#c9a84c,#e2c06a,#c9a84c,transparent);}
.cv .card-tag{color:rgba(201,168,76,.4);}
.cv .sdot{background:#c9a84c;}
.footer{margin-top:24px;text-align:center;}
.footer-line{width:36px;height:1px;background:linear-gradient(90deg,transparent,rgba(201,168,76,.2),transparent);margin:0 auto 8px;}
.footer-txt{font-size:.52rem;color:rgba(255,255,255,.14);letter-spacing:.12em;text-transform:uppercase;}
/* Ripple */
@keyframes ripple{to{transform:scale(6);opacity:0;}}
.rip{position:absolute;border-radius:50%;background:rgba(255,255,255,.08);width:40px;height:40px;margin:-20px 0 0 -20px;animation:ripple .6s linear;pointer-events:none;z-index:10;}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
</style>
</head>
